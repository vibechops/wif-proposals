<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIF India Proposals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f7f5ed;
      color: #3f1f7d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main {
      max-width: 32rem;
      width: 100%;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #78619f;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    ul { list-style: none; }
    li + li { margin-top: 0.75rem; }
    a {
      display: block;
      padding: 1rem 1.25rem;
      background: #fff;
      border: 1px solid #e8e4dc;
      border-radius: 8px;
      color: #3f1f7d;
      text-decoration: none;
      font-weight: 500;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    a:hover {
      border-color: #78619f;
      box-shadow: 0 2px 8px rgba(63, 31, 125, 0.08);
    }
    a span {
      display: block;
      font-size: 0.875rem;
      font-weight: 400;
      color: #78619f;
      margin-top: 0.25rem;
    }
    a.coming-soon {
      opacity: 0.55;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>WIF India Proposals</h1>
    <p>Partner proposal viewers and decks.</p>
    <ul>
      <li>
        <a href="/google">
          Google Flow × WIF India
          <span>Interactive proposal viewer</span>
        </a>
      </li>
      <li>
        <a href="/dell" class="coming-soon">
          Dell × WIF India
          <span>Coming soon</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
